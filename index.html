<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket チャット</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <div id="messages" class="messages"></div>
        <div class="input-container">
            <input type="text" id="messageInput" placeholder="メッセージを入力">
            <button type="button" onclick="sendMessage()">送信</button>
        </div>
    </div>

    <script>
        const socket = new WebSocket("ws://localhost:8080");

        socket.onopen = () => {
            console.log("サーバーに接続しました");
        };

        socket.onmessage = (event) => {
            const message = event.data;
            addMessage(message, "other"); // 他の人のメッセージ（左側）
        };

        socket.onclose = () => {
            console.log("サーバーとの接続が切れました");
        };

        const sendMessage = () => {
            const input = document.getElementById("messageInput");
            const message = input.value.trim();
            if (message !== "") {
                addMessage(message, "me"); // 自分のメッセージ（右側）
                socket.send("(me)" + message); // 自分のメッセージには「(me)」をつけて送信
                input.value = "";
            }
        };

        const addMessage = (message, type) => {
            const div = document.createElement("div");
            div.classList.add("message", type);
            div.textContent = message;
            document.getElementById("messages").appendChild(div);
            document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
        };
    </script>
</body>

</html>
